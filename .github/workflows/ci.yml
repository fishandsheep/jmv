name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-13
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          core.autocrlf: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: test -z "$(gofmt -l .)"

      - name: Check formatting (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = gofmt -l .
          if ($files) {
            $files | ForEach-Object { Write-Host $_ }
            exit 1
          }

      - name: Check installer syntax
        if: runner.os != 'Windows'
        shell: bash
        run: sh -n install.sh

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/jmv

      - name: Cross-build supported targets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${pair%%/*}"
            arch="${pair##*/}"
            out="dist/jmv_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              out="${out}.exe"
            fi
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -o "$out" ./cmd/jmv
          done
