name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          core.autocrlf: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Check installer syntax
        if: runner.os != 'Windows'
        run: sh -n install.sh

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/jmv

      - name: Cross-build supported targets
        if: runner.os == 'Linux'
        run: |
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${pair%%/*}"
            arch="${pair##*/}"
            out="dist/jmv_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              out="${out}.exe"
            fi
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -o "$out" ./cmd/jmv
          done
