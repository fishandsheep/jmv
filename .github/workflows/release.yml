name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        run: |
          mkdir -p dist

          # Linux/macOS — tar.gz
          for pair in linux/amd64 linux/arm64 linux/386 linux/arm darwin/amd64 darwin/arm64; do
            os="${pair%%/*}"
            arch="${pair##*/}"
            ext="tar.gz"

            echo "Building $os/$arch..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "jmv" ./cmd/jmv

            tar -czf "dist/jmv_${os}_${arch}.${ext}" jmv
            rm jmv
          done

          # Windows — zip
          for arch in amd64 arm64 386; do
            os="windows"
            ext="zip"

            echo "Building $os/$arch..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "jmv.exe" ./cmd/jmv

            zip -q "dist/jmv_${os}_${arch}.${ext}" jmv.exe
            rm jmv.exe
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum jmv_* > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" dist/* \
            --title "jmv ${tag}" \
            --notes "Release jmv ${tag}.

          Install latest with:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/fishandsheep/jmv/main/install.sh | sh
          \`\`\`" \
            --latest

      - name: Update Scoop manifest
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          amd64_hash="$(awk '/jmv_windows_amd64.zip$/ {print $1}' dist/checksums.txt)"
          arm64_hash="$(awk '/jmv_windows_arm64.zip$/ {print $1}' dist/checksums.txt)"
          export version amd64_hash arm64_hash

          python - <<'PY'
          import json, os
          path = "bucket/jmv.json"
          version = os.environ["version"]
          amd64_hash = os.environ["amd64_hash"]
          arm64_hash = os.environ["arm64_hash"]

          with open(path, "r", encoding="utf-8") as f:
            data = json.load(f)

          data["version"] = version
          data["architecture"]["64bit"]["url"] = f"https://github.com/fishandsheep/jmv/releases/download/v{version}/jmv_windows_amd64.zip"
          data["architecture"]["64bit"]["hash"] = amd64_hash
          data["architecture"]["arm64"]["url"] = f"https://github.com/fishandsheep/jmv/releases/download/v{version}/jmv_windows_arm64.zip"
          data["architecture"]["arm64"]["hash"] = arm64_hash

          with open(path, "w", encoding="utf-8") as f:
            json.dump(data, f, indent=2)
            f.write("\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          default_branch="${GITHUB_BASE_REF:-main}"
          git fetch origin "$default_branch"
          git checkout "$default_branch"
          git rebase origin/"$default_branch"
          # Simply add and commit the changes
          git add bucket/jmv.json
          if git diff --cached --quiet; then
            echo "No bucket manifest changes detected."
            exit 0
          fi
          git commit -m "chore: update scoop manifest for ${TAG}"
          git push origin "$default_branch"
