name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        run: |
          mkdir -p dist

          # Linux/macOS — tar.gz
          for pair in linux/amd64 linux/arm64 linux/386 linux/armv7 darwin/amd64 darwin/arm64; do
            os="${pair%%/*}"
            arch="${pair##*/}"
            ext="tar.gz"

            echo "Building $os/$arch..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "jmv" ./cmd/jmv

            tar -czf "dist/jmv_${os}_${arch}.${ext}" jmv
            rm jmv
          done

          # Windows — zip
          for arch in amd64 arm64 386; do
            os="windows"
            ext="zip"

            echo "Building $os/$arch..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "jmv.exe" ./cmd/jmv

            zip -q "dist/jmv_${os}_${arch}.${ext}" jmv.exe
            rm jmv.exe
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum jmv_* > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" dist/* \
            --title "jmv ${tag}" \
            --notes "Release jmv ${tag}.

          Install latest with:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/fishandsheep/okm/main/install.sh | sh
          \`\`\`" \
            --latest
